<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function</title>
</head>
<body>
    <script>
        //function: a javascript function is a reausable block of code designed to perform a specific task
        //normal function
        function demo(){
            console.log("hello");
        }
        demo();
        //normal function with parameter 
        function demo1(text){
            console.log("hello"+text);
        }
        demo1("js");
        //function with default parameter
        function add(a,b=10){
            console.log("addition of two number is "+(a+b));
        }
        add(16);// b will use its default value 
        add(10,20);//b will use the provide value of 20
        // anonymus function  :
        let cal=function(){
            var num1=5;
            var num2=10;
            var res=num1*num2;
            console.log("multiply of num1 and num2  " + res);
        }
        cal();
        //arrow function
        let div=(x,y)=>{
             var num1=x;
            var num2=y;
            var res=x/y;
            console.log("division is "+res);
        }
        div(12,3);

        //arrow function with single line statement
        let msg=()=>console.log("hello world");
        msg();
        // callback function 
        function sub(a,b,callback){
            var num1=a;
            var num2=b;
            var res=num1-num2;
            callback(res);
        }
        function displayRes(res){
            console.log("subtraction is "+res);
        }
        sub(10,5,displayRes);
        //callback using setTimeout API
        function msg1(){
            console.log("welcome to js");
        }
        setTimeout(msg1, 2000);
    //IIFE (Immediately Invoked Function Expression)
    (function(a,b){
        console.log(`first parameter ${a} and second parameter ${b}`);
        var res=a+b;
        console.log(`result is ${res}`);
    })(4,5);
    // short code using arrow function 
    (msg=>console.log("hello "))();
    //promises - a promise is an object that represents the eventual completion (or failure) 
    // of an asynchronous operation and its resulting value.
        let promise=new Promise((resolve,reject)=>{
           let age=25;
            if(age>=18){
                resolve("valid age");
            }else{
                reject("wait for next year");
            }
        });

        //console.log(promise);
        promise.then(msg=>console.log(msg)).catch(err=>console.log(error));
        //async/await - async/await is a syntactic sugar built on top of promises,
        //  making asynchronous code easier to read and write.
        

        //https://dummyjson.com/products
            async function userData(){
                
                    let response=await fetch("https://dummyjson.com/products");
                    let responsedata=await response.json();
                    console.log(responsedata);
            }
            userData();

            //error handling using try catch block
            async function fetchData(){
                try{ let response=await fetch("https://dummyjson.com/products");
                    let responsedata=await response.json();
                    console.log(responsedata);}
                catch(error){
                    console.log("error fetching data "+error);
                }
            }
            fetchData(); 
            //local storage - local storage is a web storage API that allows you to store data in the browser's local storage,
            //  which persists even after the browser is closed.
            let  myInfo={
                name:"john",
                age:30,
                city:"new york"
            }
            // convvert the object to string using stringify
            let myInfoString=JSON.stringify(myInfo);
            //set data
            localStorage.setItem("preference",myInfoString);
            //retrieve data parsing the object back
            let getMyInfoData=localStorage.getItem("preference");
            //parse the object
            const finalData=JSON.parse(getMyInfoData);
            console.log(finalData.name);
            //high order function - a high order function is a function that takes one or more functions as arguments,
            //  or returns a function as its result.

            //map() filter() reduce() foreach() 
                let numbers=[1,2,3,4,5];
                //map() - creates a new array by applying a function to each element of the original array.
                let squaredNumbers=numbers.map(num=>num*num);
                console.log(squaredNumbers);
                //filter() - creates a new array with all elements that pass the test implemented by the provided function.
                let evenNumbers=numbers.filter(num=>num%2===0);
                console.log(evenNumbers);
                //reduce() - executes a reducer function on each element of the array, resulting in a single output value.
                let sum=numbers.reduce((acc,num)=>acc+num,0);
                console.log(sum);
                //forEach() - executes a provided function once for each array element.
                numbers.forEach(num=>console.log(num)); 
    </script>
</body>
</html>
