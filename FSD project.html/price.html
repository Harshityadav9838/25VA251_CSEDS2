<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Filter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Tahoma, sans-serif;
}

body{
    padding:20px;
    background:#f5f5f5;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.card img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.title{
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

.price{
    color:red;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>
<body>

<h2>Products Sorted by Price (Low to High)</h2>

<div class="container">

    <div class="card">
        <img src="electronics3.webp" alt="Mouse">
        <div class="title">ARTICFOX MOUSE</div>
        <div class="price">₹259</div>
    </div>

    <div class="card">
        <img src="tshirt2.webp" alt="T-Shirt">
        <div class="title">Classic Cotton T-Shirt</div>
        <div class="price">₹399</div>
    </div>

    <div class="card">
        <img src="electronics4.webp" alt="Hair Dryer">
        <div class="title">PHILIPS HAIR DRYER</div>
        <div class="price">₹1,099</div>
    </div>

    <div class="card">
        <img src="electronics2.webp" alt="Printer">
        <div class="title">CANON PRINTER</div>
        <div class="price">₹13,999</div>
    </div>

    <div class="card">
        <img src="electronics.webp" alt="Watch">
        <div class="title">SAMSUNG WATCH</div>
        <div class="price">₹15,999</div>
    </div>

</div>

</body>
</html>
